<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iran / US / Israel - Intelligence Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0a0e17;
    --bg-card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --text-primary: #f8fafc;
    --text-secondary: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --text-faint: #475569;
    --accent-blue: #3b82f6;
    --accent-blue-dim: rgba(59,130,246,0.15);
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Libre Baskerville', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
  }

  body {
    background: var(--bg-deep);
    color: var(--text-secondary);
    font-family: var(--sans);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 32px 20px 48px;
    position: relative; z-index: 1;
  }

  .header { margin-bottom: 28px; animation: fadeSlideIn 0.5s ease both; }
  .header-label { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .header-label span { font: 700 10px/1 var(--mono); letter-spacing: 2px; color: var(--text-dim); }
  .header-label .line { flex: 1; height: 1px; background: var(--border); }
  h1 { font: 700 28px/1.3 var(--serif); color: var(--text-primary); }
  .subtitle { margin-top: 6px; font-size: 14px; color: var(--text-dim); }

  /* ===== INDONESIAN SUMMARY BOX ===== */
  .id-summary {
    background: linear-gradient(135deg, rgba(220,38,38,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(220,38,38,0.15);
    border-left: 3px solid #dc2626;
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 24px;
    animation: fadeSlideIn 0.4s ease 0.05s both;
  }
  .id-summary .label {
    font: 700 10px/1 var(--mono);
    letter-spacing: 1.5px;
    color: #dc2626;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .id-summary .label .flag { font-size: 14px; }
  .id-summary .text {
    font: 400 14.5px/1.75 var(--sans);
    color: #e2e8f0;
  }
  .id-summary .text em {
    color: #fca5a5;
    font-style: normal;
    font-weight: 600;
  }

  /* ===== WW3 ESCALATION METER ===== */
  .escalation-section {
    margin-bottom: 24px;
    animation: fadeSlideIn 0.4s ease 0.1s both;
  }
  .escalation-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
  }
  .escalation-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .escalation-header .label {
    font: 700 10px/1 var(--mono);
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .escalation-level-text {
    font: 700 12px/1 var(--mono);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .meter-track {
    position: relative;
    height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .meter-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 1s ease;
  }
  .meter-labels {
    display: flex; justify-content: space-between;
    font: 400 9px/1 var(--mono);
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .escalation-factors {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .esc-factor {
    font: 400 10px/1 var(--mono);
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
  }
  .esc-factor.active {
    background: rgba(220,38,38,0.12);
    border-color: rgba(220,38,38,0.3);
    color: #fca5a5;
  }

  /* ===== COMMODITY PRICES ===== */
  .commodities {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeSlideIn 0.4s ease 0.15s both;
  }
  .commodity-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .commodity-card .label {
    font: 700 10px/1 var(--mono);
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .commodity-card .price {
    font: 700 24px/1 var(--serif);
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .commodity-card .change {
    font: 600 12px/1 var(--mono);
    display: inline-flex; align-items: center; gap: 3px;
  }
  .commodity-card .change.up { color: #22c55e; }
  .commodity-card .change.down { color: #ef4444; }
  .commodity-card .change.flat { color: var(--text-dim); }
  .commodity-card .source-note {
    font: 400 9px/1.3 var(--mono);
    color: var(--text-faint);
    margin-top: 8px;
  }

  /* ===== EXISTING STYLES ===== */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 10px;
  }
  .feed-count {
    font: 400 12px/1.4 var(--mono); color: var(--text-dim);
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted); padding: 8px 16px; border-radius: 6px;
    font: 400 12px/1 var(--mono); cursor: pointer; transition: all 0.2s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-secondary); }

  .loading-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 20px; animation: fadeSlideIn 0.3s ease both;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }
  .loading-text { font: 400 14px/1 var(--mono); color: var(--text-muted); text-align: center; }
  .loading-detail { font: 400 11px/1.4 var(--mono); color: var(--text-faint); margin-top: 8px; text-align: center; }

  .error-state {
    background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3);
    border-radius: 10px; padding: 24px; text-align: center;
  }
  .error-state p { color: #fca5a5; margin-bottom: 16px; font-size: 14px; line-height: 1.6; white-space: pre-line; }
  .error-state button {
    background: #dc2626; color: #fff; border: none;
    padding: 10px 24px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }

  .section-label {
    font: 700 11px/1 var(--mono); letter-spacing: 1.5px;
    color: var(--text-dim); margin-bottom: 14px;
  }

  .headline-card {
    background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.06));
    border: 1px solid var(--accent-blue-dim);
    border-radius: 12px; padding: 22px 24px; margin-bottom: 24px;
  }
  .headline-card .label { font: 700 10px/1 var(--mono); letter-spacing: 1.5px; color: var(--accent-blue); }
  .headline-card .text { margin-top: 8px; font: 600 17px/1.5 var(--serif); color: #f1f5f9; }
  .headline-card .text a {
    color: inherit; text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.15); transition: border-color 0.2s;
  }
  .headline-card .text a:hover { border-color: var(--accent-blue); }
  .headline-card .meta {
    display: flex; gap: 12px; align-items: center; margin-top: 10px;
    font: 400 11px/1 var(--mono); color: var(--text-dim); flex-wrap: wrap;
  }

  .news-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .news-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    opacity: 0; animation: fadeSlideIn 0.4s ease both;
    transition: border-color 0.2s;
  }
  .news-card:hover { border-color: rgba(255,255,255,0.15); }
  .news-card-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 8px; gap: 12px;
  }
  .news-card h3 { font: 600 15px/1.4 var(--serif); color: #f1f5f9; }
  .news-card h3 a {
    color: inherit; text-decoration: none;
    border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  .news-card h3 a:hover { border-bottom-color: rgba(255,255,255,0.3); }
  .news-card .summary { font-size: 13.5px; color: var(--text-muted); line-height: 1.65; }
  .news-card .card-meta {
    display: flex; gap: 16px; margin-top: 10px;
    font: 400 11px/1 var(--mono); color: var(--text-dim); flex-wrap: wrap;
  }

  .cat-tag {
    font: 700 10px/1 var(--mono); letter-spacing: 1.2px;
    padding: 3px 8px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .cat-MILITARY      { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .cat-DIPLOMATIC    { background: #dbeafe; color: #1e3a8a; border: 1px solid #93c5fd; }
  .cat-ECONOMIC      { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
  .cat-HUMANITARIAN  { background: #fce7f3; color: #9d174d; border: 1px solid #f9a8d4; }
  .cat-NUCLEAR       { background: #f3e8ff; color: #6b21a8; border: 1px solid #d8b4fe; }
  .cat-GENERAL       { background: rgba(255,255,255,0.08); color: #94a3b8; border: 1px solid rgba(255,255,255,0.12); }

  .cat-summary {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px;
  }
  .cat-summary .cat-tag { font-size: 11px; padding: 5px 10px; }

  .quick-links {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  }
  .quick-link {
    display: inline-block; font: 400 12px/1 var(--mono); color: var(--text-muted);
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 6px;
    text-decoration: none; transition: all 0.2s;
  }
  .quick-link:hover {
    background: rgba(255,255,255,0.06); color: var(--text-secondary);
    border-color: rgba(255,255,255,0.15);
  }

  .footer {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 16px; margin-top: 8px;
  }
  .footer p { font: 400 11px/1.5 var(--mono); color: var(--text-faint); text-align: center; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    .headline-card .text { font-size: 15px; }
    .container { padding: 20px 14px 40px; }
    .commodities { grid-template-columns: 1fr; }
    .commodity-card .price { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-label">
      <span>INTELLIGENCE BRIEFING</span>
      <div class="line"></div>
    </div>
    <h1>Iran / US / Israel</h1>
    <p class="subtitle">Conflict Monitor &bull; Eskalasi &bull; Komoditas</p>
  </header>

  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <p class="loading-text" id="progress-text">Mengambil data terbaru...</p>
    <p class="loading-detail" id="progress-detail"></p>
  </div>

  <div id="error" style="display:none;" class="error-state">
    <p id="error-msg"></p>
    <button onclick="fetchAll()">Coba Lagi</button>
  </div>

  <div id="content" style="display:none;"></div>
</div>

<script>
// ===== CONFIG =====
const NEWS_QUERIES = [
  'iran+US+israel+conflict',
  'iran+nuclear+negotiations',
  'iran+israel+military+houthi+hezbollah'
];

const PROXIES = [
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

// Yahoo Finance symbols for gold & oil
const COMMODITY_SYMBOLS = {
  gold: 'GC=F',
  oil: 'CL=F'
};

// ===== CATEGORIZATION =====
const CAT_KEYWORDS = {
  MILITARY:     ['military','strike','attack','bomb','missile','drone','war','army','navy','defense','weapon','troops','combat','raid','offensive','houthi','hezbollah','hamas','idf','irgc','pentagon','kill','intercept','invasion','deploy'],
  DIPLOMATIC:   ['diplomacy','diplomatic','talks','negotiat','summit','un ','united nations','ambassador','embassy','ceasefire','peace','deal','agreement','treaty','envoy','minister','bilateral'],
  NUCLEAR:      ['nuclear','uranium','enrichment','centrifuge','iaea','atomic','nonproliferation','jcpoa','breakout'],
  ECONOMIC:     ['sanction','oil','trade','economic','economy','market','price','export','import','barrel','energy','financial','tariff'],
  HUMANITARIAN: ['humanitarian','civilian','refugee','aid','crisis','casualt','death toll','displacement','hospital','relief','evacuat']
};

function categorize(text) {
  const lower = text.toLowerCase();
  let best = 'GENERAL', bestCount = 0;
  for (const [cat, kws] of Object.entries(CAT_KEYWORDS)) {
    const count = kws.filter(k => lower.includes(k)).length;
    if (count > bestCount) { bestCount = count; best = cat; }
  }
  return best;
}

// ===== WW3 ESCALATION ANALYSIS =====
const ESCALATION_FACTORS = [
  { id: 'direct_strike', label: 'Serangan langsung antar negara', keywords: ['iran strikes israel','israel strikes iran','us strikes iran','iran attacks','retaliatory strike','direct attack','military strike on iran','strike on israel'] },
  { id: 'nuclear', label: 'Eskalasi nuklir', keywords: ['nuclear weapon','nuclear bomb','uranium enrichment 90','nuclear warhead','nuclear threat','atomic weapon','nuclear program','breakout time'] },
  { id: 'troops', label: 'Pengerahan pasukan besar', keywords: ['deploy troops','ground invasion','military buildup','troop deployment','boots on the ground','military mobiliz','naval fleet','carrier group','aircraft carrier'] },
  { id: 'proxy', label: 'Konflik proxy meluas', keywords: ['houthi','hezbollah attack','hamas','proxy war','yemen','lebanon','syria attack','iraq militia','red sea'] },
  { id: 'alliance', label: 'Keterlibatan blok militer', keywords: ['nato','russia support','china support','coalition','alliance','mutual defense','collective defense','axis','bloc'] },
  { id: 'civilians', label: 'Korban sipil massal', keywords: ['civilian casualties','massacre','death toll','war crime','genocide','mass casualt','humanitarian catastroph','civilian death'] },
  { id: 'sanctions', label: 'Sanksi ekonomi berat', keywords: ['sanction','embargo','economic war','trade block','oil embargo','financial sanction','asset freeze','swift ban'] },
  { id: 'rhetoric', label: 'Retorika perang tinggi', keywords: ['threat of war','world war','total war','all-out war','declaration of war','act of war','war footing','existential threat','annihilat'] },
];

function analyzeEscalation(articles) {
  const allText = articles.map(a => (a.title + ' ' + a.summary).toLowerCase()).join(' ');
  const activeFactors = [];
  let score = 0;

  ESCALATION_FACTORS.forEach(factor => {
    const hits = factor.keywords.filter(k => allText.includes(k)).length;
    if (hits > 0) {
      activeFactors.push(factor.id);
      score += Math.min(hits, 3); // cap each factor's contribution
    }
  });

  // Normalize to 0-100
  const maxScore = ESCALATION_FACTORS.length * 3;
  const pct = Math.min(Math.round((score / maxScore) * 100), 100);

  let level, color, bgColor;
  if (pct >= 75)      { level = 'KRITIS'; color = '#dc2626'; bgColor = 'rgba(220,38,38,0.15)'; }
  else if (pct >= 55) { level = 'TINGGI'; color = '#ea580c'; bgColor = 'rgba(234,88,12,0.12)'; }
  else if (pct >= 35) { level = 'WASPADA'; color = '#d97706'; bgColor = 'rgba(217,119,6,0.12)'; }
  else if (pct >= 15) { level = 'SEDANG'; color = '#2563eb'; bgColor = 'rgba(37,99,235,0.12)'; }
  else                { level = 'RENDAH'; color = '#16a34a'; bgColor = 'rgba(22,163,74,0.12)'; }

  return { pct, level, color, bgColor, activeFactors };
}

// ===== INDONESIAN SUMMARY GENERATION =====
function generateSummary(articles, catCounts, escalation) {
  const militaryCount = catCounts.MILITARY || 0;
  const diplomaticCount = catCounts.DIPLOMATIC || 0;
  const nuclearCount = catCounts.NUCLEAR || 0;
  const total = articles.length;

  let summaryParts = [];

  // Opening
  summaryParts.push(`Terdapat <em>${total} berita</em> terkini mengenai konflik Iran-AS-Israel.`);

  // Category highlights
  if (militaryCount > 0 && militaryCount >= diplomaticCount) {
    summaryParts.push(`Perkembangan didominasi oleh berita <em>militer (${militaryCount} artikel)</em>, menunjukkan ketegangan yang masih tinggi di lapangan.`);
  } else if (diplomaticCount > 0 && diplomaticCount > militaryCount) {
    summaryParts.push(`Terdapat sinyal <em>diplomasi aktif (${diplomaticCount} artikel)</em>, mengindikasikan adanya upaya de-eskalasi.`);
  }

  if (nuclearCount > 0) {
    summaryParts.push(`Isu <em>nuklir muncul dalam ${nuclearCount} laporan</em>, yang perlu diperhatikan dampaknya terhadap keamanan global.`);
  }

  // Escalation note
  summaryParts.push(`Level eskalasi menuju konflik militer global saat ini: <em>${escalation.level} (${escalation.pct}%)</em>.`);

  // Top headline
  if (articles[0]) {
    summaryParts.push(`Berita utama: <em>${articles[0].title}</em>.`);
  }

  return summaryParts.join(' ');
}

// ===== COMMODITY PRICES =====
async function fetchCommodityPrices() {
  const results = { gold: null, oil: null };

  for (const [name, symbol] of Object.entries(COMMODITY_SYMBOLS)) {
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=2d`;
      const data = await fetchJSON(url);

      if (data && data.chart && data.chart.result && data.chart.result[0]) {
        const r = data.chart.result[0];
        const meta = r.meta;
        const price = meta.regularMarketPrice;
        const prevClose = meta.chartPreviousClose || meta.previousClose;
        const change = price - prevClose;
        const changePct = (change / prevClose) * 100;
        const currency = meta.currency || 'USD';

        results[name] = {
          price: price.toFixed(2),
          change: change.toFixed(2),
          changePct: changePct.toFixed(2),
          currency,
          up: change >= 0
        };
      }
    } catch (e) {
      console.log(`Commodity ${name} fetch failed:`, e.message);
    }
  }

  return results;
}

async function fetchJSON(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const proxyUrl = PROXIES[i](url);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
        return JSON.parse(text);
      }
    } catch (e) { continue; }
  }
  return null;
}

// ===== RSS PARSING =====
function parseRSSXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const items = [];
  doc.querySelectorAll('item').forEach(entry => {
    const get = (tag) => { const el = entry.querySelector(tag); return el ? el.textContent.trim() : ''; };
    items.push({
      title: get('title'),
      link: get('link'),
      description: get('description'),
      pubDate: get('pubDate'),
      source: get('source') || extractSource(get('title'))
    });
  });
  return items;
}

async function fetchRSSWithFallback(rssUrl) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const proxyUrl = PROXIES[i](rssUrl);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text.trim().startsWith('{')) {
        const data = JSON.parse(text);
        if (data.status === 'ok' && data.items) return data.items;
        continue;
      }
      if (text.includes('<item>')) {
        const items = parseRSSXML(text);
        if (items.length > 0) return items;
      }
    } catch (e) { continue; }
  }
  return [];
}

// ===== UTILS =====
function timeAgo(dateStr) {
  try {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 2) return 'Baru saja';
    if (mins < 60) return mins + ' menit lalu';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs === 1 ? '1 jam lalu' : hrs + ' jam lalu';
    const days = Math.floor(hrs / 24);
    return days === 1 ? 'Kemarin' : days + ' hari lalu';
  } catch { return ''; }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function stripHTML(html) {
  const t = document.createElement('div');
  t.innerHTML = html || '';
  return (t.textContent || '').trim();
}

function extractSource(title) {
  const m = (title || '').match(/\s[-\u2013\u2014]\s([^-\u2013\u2014]+)$/);
  return m ? m[1].trim() : '';
}

function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setText(id, t) { document.getElementById(id).textContent = t; }

// ===== MAIN FETCH =====
async function fetchAll() {
  hide('content'); hide('error'); show('loading');
  setText('progress-text', 'Mengambil data terbaru...');
  setText('progress-detail', '');

  try {
    // Fetch news + commodities in parallel
    const newsPromise = fetchAllNews();
    const commodityPromise = fetchCommodityPrices();

    const [articles, commodities] = await Promise.all([newsPromise, commodityPromise]);

    if (articles.length === 0) {
      throw new Error(
        'Tidak dapat mengambil berita. Biasanya disebabkan oleh CORS restriction.\n\n' +
        'Solusi:\n' +
        '1. Jalankan local server: npx serve .\n' +
        '2. Gunakan extension "CORS Unblock" di browser\n' +
        '3. Upload ke hosting gratis (Netlify Drop, Vercel, GitHub Pages)'
      );
    }

    setText('progress-text', 'Menyusun briefing...');
    renderAll(articles, commodities);

  } catch (err) {
    console.error(err);
    hide('loading');
    document.getElementById('error-msg').innerText = err.message;
    show('error');
  }
}

async function fetchAllNews() {
  const allItems = [];
  const seen = new Set();
  let feedsDone = 0;

  for (const query of NEWS_QUERIES) {
    feedsDone++;
    setText('progress-detail', `Memindai sumber berita ${feedsDone}/${NEWS_QUERIES.length}...`);
    const rssUrl = `https://news.google.com/rss/search?q=${query}&hl=en-US&gl=US&ceid=US:en`;
    const items = await fetchRSSWithFallback(rssUrl);
    items.forEach(item => {
      const key = (item.title || '').trim().toLowerCase().replace(/\s+/g, ' ');
      if (key && !seen.has(key)) { seen.add(key); allItems.push(item); }
    });
  }

  allItems.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));

  return allItems.slice(0, 20).map(item => ({
    title: item.title || 'Untitled',
    link: item.link || '#',
    summary: stripHTML(item.description || item.content || '').slice(0, 300),
    source: item.source || item.author || extractSource(item.title),
    date: item.pubDate,
    category: categorize((item.title || '') + ' ' + stripHTML(item.description || ''))
  }));
}

// ===== RENDER =====
function renderAll(articles, commodities) {
  hide('loading');

  const top = articles[0];
  const rest = articles.slice(1);
  const catCounts = {};
  articles.forEach(a => { catCounts[a.category] = (catCounts[a.category] || 0) + 1; });

  const escalation = analyzeEscalation(articles);
  const summaryHTML = generateSummary(articles, catCounts, escalation);

  // Commodity HTML
  const goldData = commodities.gold;
  const oilData = commodities.oil;

  let cards = '';
  rest.forEach((a, i) => {
    cards += `
      <div class="news-card" style="animation-delay:${0.15 + i * 0.06}s">
        <div class="news-card-header">
          <h3><a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a></h3>
          <span class="cat-tag cat-${a.category}">${a.category}</span>
        </div>
        ${a.summary ? `<p class="summary">${esc(a.summary)}</p>` : ''}
        <div class="card-meta">
          ${a.source ? `<span>${esc(a.source)}</span>` : ''}
          <span>${timeAgo(a.date)}</span>
        </div>
      </div>`;
  });

  const now = new Date();
  const dateStr = now.toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const timeStr = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

  document.getElementById('content').innerHTML = `
    <div class="top-bar">
      <span class="feed-count">${dateStr}, ${timeStr}</span>
      <button class="refresh-btn" onclick="fetchAll()">&#x21BB; Refresh</button>
    </div>

    <!-- RINGKASAN BAHASA INDONESIA -->
    <div class="id-summary">
      <div class="label"><span class="flag">&#127470;&#127465;</span> RINGKASAN SITUASI</div>
      <div class="text">${summaryHTML}</div>
    </div>

    <!-- WW3 ESCALATION METER -->
    <div class="escalation-section">
      <div class="escalation-card">
        <div class="escalation-header">
          <span class="label">&#x26A0;&#xFE0F; INDIKATOR ESKALASI PERANG DUNIA III</span>
          <span class="escalation-level-text" style="background:${escalation.bgColor};color:${escalation.color};border:1px solid ${escalation.color}40">${escalation.level} ${escalation.pct}%</span>
        </div>
        <div class="meter-track">
          <div class="meter-fill" style="width:${escalation.pct}%;background:linear-gradient(90deg,#16a34a,#d97706 50%,#dc2626);"></div>
        </div>
        <div class="meter-labels">
          <span>RENDAH</span>
          <span>SEDANG</span>
          <span>WASPADA</span>
          <span>TINGGI</span>
          <span>KRITIS</span>
        </div>
        <div class="escalation-factors">
          ${ESCALATION_FACTORS.map(f =>
            `<span class="esc-factor ${escalation.activeFactors.includes(f.id) ? 'active' : ''}">${f.label}</span>`
          ).join('')}
        </div>
      </div>
    </div>

    <!-- COMMODITY PRICES -->
    <div class="section-label">&#x1F4C8; HARGA KOMODITAS DUNIA</div>
    <div class="commodities">
      <div class="commodity-card">
        <div class="label">&#x1F947; EMAS (Gold Futures)</div>
        ${goldData ? `
          <div class="price">$${goldData.price}</div>
          <span class="change ${goldData.up ? 'up' : 'down'}">
            ${goldData.up ? '&#9650;' : '&#9660;'} $${Math.abs(goldData.change).toFixed(2)} (${goldData.up ? '+' : ''}${goldData.changePct}%)
          </span>
          <div class="source-note">Yahoo Finance &middot; GC=F</div>
        ` : `
          <div class="price" style="font-size:14px;color:var(--text-dim);">Data tidak tersedia</div>
          <div class="source-note">Cek: <a href="https://finance.yahoo.com/quote/GC=F/" target="_blank" style="color:var(--accent-blue)">Yahoo Finance</a></div>
        `}
      </div>
      <div class="commodity-card">
        <div class="label">&#x1F6E2;&#xFE0F; MINYAK (Crude Oil WTI)</div>
        ${oilData ? `
          <div class="price">$${oilData.price}</div>
          <span class="change ${oilData.up ? 'up' : 'down'}">
            ${oilData.up ? '&#9650;' : '&#9660;'} $${Math.abs(oilData.change).toFixed(2)} (${oilData.up ? '+' : ''}${oilData.changePct}%)
          </span>
          <div class="source-note">Yahoo Finance &middot; CL=F</div>
        ` : `
          <div class="price" style="font-size:14px;color:var(--text-dim);">Data tidak tersedia</div>
          <div class="source-note">Cek: <a href="https://finance.yahoo.com/quote/CL=F/" target="_blank" style="color:var(--accent-blue)">Yahoo Finance</a></div>
        `}
      </div>
    </div>

    <!-- HEADLINE -->
    <div class="headline-card">
      <span class="label">BERITA UTAMA</span>
      <p class="text"><a href="${esc(top.link)}" target="_blank" rel="noopener">${esc(top.title)}</a></p>
      <div class="meta">
        ${top.source ? `<span>${esc(top.source)}</span>` : ''}
        <span>${timeAgo(top.date)}</span>
        <span class="cat-tag cat-${top.category}" style="font-size:9px;padding:2px 6px;">${top.category}</span>
      </div>
    </div>

    <!-- COVERAGE BREAKDOWN -->
    <section>
      <div class="section-label">KATEGORI LIPUTAN</div>
      <div class="cat-summary">
        ${Object.entries(catCounts).sort((a,b) => b[1]-a[1]).map(([cat, n]) =>
          `<span class="cat-tag cat-${cat}">${cat} (${n})</span>`
        ).join('')}
      </div>
    </section>

    <!-- ALL DEVELOPMENTS -->
    <section>
      <div class="section-label">SEMUA PERKEMBANGAN</div>
      <div class="news-list">${cards}</div>
    </section>

    <!-- DEEP DIVE -->
    <section>
      <div class="section-label">SUMBER ANALISIS MENDALAM</div>
      <div class="quick-links">
        <a class="quick-link" href="https://www.aljazeera.com/tag/iran/" target="_blank">Al Jazeera</a>
        <a class="quick-link" href="https://www.reuters.com/world/middle-east/" target="_blank">Reuters</a>
        <a class="quick-link" href="https://www.bbc.com/news/world/middle_east" target="_blank">BBC</a>
        <a class="quick-link" href="https://www.middleeasteye.net/" target="_blank">Middle East Eye</a>
        <a class="quick-link" href="https://www.timesofisrael.com/" target="_blank">Times of Israel</a>
        <a class="quick-link" href="https://www.iaea.org/newscenter/pressreleases" target="_blank">IAEA</a>
      </div>
    </section>

    <footer class="footer">
      <p>Live feed via Google News RSS. Harga komoditas dari Yahoo Finance. Verifikasi informasi penting secara independen.</p>
    </footer>
  `;
  show('content');
}

// Start
fetchAll();
</script>
