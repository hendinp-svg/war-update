<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

.ql{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.qlk{display:inline-block;font:400 12px/1 var(--mono);color:var(--t3);background:var(--card);border:1px solid var(--border);padding:8px 14px;border-radius:6px;text-decoration:none;transition:all .2s}
.qlk:hover{background:rgba(255,255,255,0.06);color:var(--t2);border-color:rgba(255,255,255,0.15)}

.ft{border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;margin-top:8px}

.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;animation:fi .3s ease both}

.lt{font:400 14px/1 var(--mono);color:var(--t3);text-align:center}
.ld2{font:400 11px/1.4 var(--mono);color:var(--t5);margin-top:8px;text-align:center}
.es{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:10px;padding:24px;text-align:center}
.es p{color:#fca5a5;margin-bottom:16px;font-size:14px;line-height:1.6;white-space:pre-line}
.es button{background:#dc2626;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@media(max-width:520px){
  h1{font-size:22px}.hc .tx{font-size:15px}.ctn{padding:20px 14px 40px}

<body>
<div class="ctn">
  <header class="hdr">
    <div class="hdr-l"><span>INTELLIGENCE BRIEFING</span><div class="ln"></div></div>
    <h1>Iran / US / Israel</h1>
    <p class="sub">Conflict Monitor &bull; Eskalasi &bull; Komoditas &bull; Live</p>
  </header>
  <div id="loading" class="ls"><div class="sp"></div><p class="lt" id="pt">Mengambil data terbaru...</p><p class="ld2" id="pd"></p></div>
  <div id="error" style="display:none" class="es"><p id="em"></p><button onclick="fetchAll()">Coba Lagi</button></div>
  <div id="content" style="display:none"></div>
</div>

<script>
const NQ=['iran+US+israel+conflict','iran+nuclear+negotiations','iran+israel+military+houthi+hezbollah'];
const PX=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u=>`https://everyorigin.jwvbremen.nl/api/get?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  u=>`https://corsproxy.org/?${encodeURIComponent(u)}`,
];
const TF=[
  {key:'1D',range:'1d',interval:'5m',label:'Hari ini'},
  {key:'1W',range:'5d',interval:'15m',label:'1 Minggu'},
  {key:'1M',range:'1mo',interval:'1d',label:'1 Bulan'},
  {key:'1Y',range:'1y',interval:'1wk',label:'1 Tahun'},
  {key:'5Y',range:'5y',interval:'1mo',label:'5 Tahun'},
];

let gC=null,oC=null,gTF='1D',oTF='1D';
let arts=[],comms={};
let nt,pt2,ct2,ckt;

const ESC_F=[
  {id:'ds',l:'Serangan langsung antar negara',kw:['iran strikes israel','israel strikes iran','us strikes iran','retaliatory strike','direct attack','military strike']},
  {id:'nu',l:'Eskalasi nuklir',kw:['nuclear weapon','nuclear bomb','uranium enrichment 90','nuclear warhead','nuclear threat','breakout time']},
  {id:'tr',l:'Pengerahan pasukan besar',kw:['deploy troops','ground invasion','military buildup','troop deployment','boots on the ground','carrier group','aircraft carrier']},
  {id:'px',l:'Konflik proxy meluas',kw:['houthi','hezbollah attack','hamas','proxy war','yemen','lebanon','syria attack','iraq militia','red sea']},
  {id:'al',l:'Keterlibatan blok militer',kw:['nato','russia support','china support','coalition','alliance','mutual defense']},
  {id:'cv',l:'Korban sipil massal',kw:['civilian casualties','massacre','death toll','war crime','genocide','mass casualt']},
  {id:'sa',l:'Sanksi ekonomi berat',kw:['sanction','embargo','economic war','oil embargo','swift ban']},
  {id:'rh',l:'Retorika perang tinggi',kw:['threat of war','world war','total war','all-out war','declaration of war','act of war','annihilat']},
];
const CK={
  MILITARY:['military','strike','attack','bomb','missile','drone','war','army','navy','defense','weapon','troops','combat','houthi','hezbollah','hamas','idf','irgc','pentagon','kill','intercept'],
  DIPLOMATIC:['diplomacy','diplomatic','talks','negotiat','summit','ambassador','ceasefire','peace','deal','agreement','treaty','envoy','minister'],
  NUCLEAR:['nuclear','uranium','enrichment','centrifuge','iaea','atomic','jcpoa','breakout'],
  ECONOMIC:['sanction','oil','trade','economic','economy','market','price','export','energy','financial','tariff'],
  HUMANITARIAN:['humanitarian','civilian','refugee','aid','crisis','casualt','death toll','displacement','hospital','relief']
};
function cat(t){const l=t.toLowerCase();let b='GENERAL',bc=0;for(const[c,kw]of Object.entries(CK)){const n=kw.filter(k=>l.includes(k)).length;if(n>bc){bc=n;b=c;}}return b;}
function esc_a(a){
  const all=a.map(x=>(x.title+' '+x.summary).toLowerCase()).join(' ');
  const act=[];let sc=0;
  ESC_F.forEach(f=>{const h=f.kw.filter(k=>all.includes(k)).length;if(h>0){act.push(f.id);sc+=Math.min(h,3);}});
  const p=Math.min(Math.round((sc/(ESC_F.length*3))*100),100);
  let lv,cl,bg;
  if(p>=75){lv='KRITIS';cl='#dc2626';bg='rgba(220,38,38,0.15)';}
  else if(p>=55){lv='TINGGI';cl='#ea580c';bg='rgba(234,88,12,0.12)';}
  else if(p>=35){lv='WASPADA';cl='#d97706';bg='rgba(217,119,6,0.12)';}
  else if(p>=15){lv='SEDANG';cl='#2563eb';bg='rgba(37,99,235,0.12)';}
  else{lv='RENDAH';cl='#16a34a';bg='rgba(22,163,74,0.12)';}
  return{p,level:lv,color:cl,bg,af:act};
}

// Fetch helpers
async function vp(url){
  // Race all proxies in parallel - first successful response wins
  const attempts = PX.map((px, i) =>
    fetch(px(url), {signal: AbortSignal.timeout(12000)})
      .then(async r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const t = await r.text();
        // Handle everyorigin wrapper
        let body = t;
        try { const j = JSON.parse(t); if (j.html) body = j.html; else if (j.contents) body = j.contents; } catch {}
        if (body.trim().startsWith('{') || body.trim().startsWith('[')) return JSON.parse(body);
        if (body.includes('<item>')) return {__xml: body};
        throw new Error('Unexpected response format');
      })
      .catch(e => { throw e; })
  );
  // Use Promise.any - resolves with first success, rejects only if ALL fail
  try { return await Promise.any(attempts); } catch { return null; }
}
function pRSS(x){const d=new DOMParser().parseFromString(x,'text/xml');const it=[];d.querySelectorAll('item').forEach(e=>{const g=t=>{const el=e.querySelector(t);return el?el.textContent.trim():'';};it.push({title:g('title'),link:g('link'),description:g('description'),pubDate:g('pubDate'),source:g('source')||xSrc(g('title'))});});return it;}

// News
async function fetchNews(s){
  if(!s)sT('pd','Memindai sumber berita...');
  const all=[],seen=new Set();
  for(const q of NQ){
    const d=await vp(`https://news.google.com/rss/search?q=${q}&hl=en-US&gl=US&ceid=US:en`);if(!d)continue;
    let it=[];if(d.__xml)it=pRSS(d.__xml);else if(d.status==='ok'&&d.items)it=d.items;
    it.forEach(i=>{const k=(i.title||'').trim().toLowerCase().replace(/\s+/g,' ');if(k&&!seen.has(k)){seen.add(k);all.push(i);}});
  }
  all.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
  return all.slice(0,20).map(i=>({title:i.title||'',link:i.link||'#',summary:sH(i.description||i.content||'').slice(0,300),source:i.source||i.author||xSrc(i.title),date:i.pubDate,category:cat((i.title||'')+' '+sH(i.description||''))}));
}

// Commodity
async function fetchPrices(){
  const r={gold:null,oil:null};
  for(const[n,s]of[['gold','GC=F'],['oil','CL=F']]){
    try{const d=await vp(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=2d`);if(d?.chart?.result){const m=d.chart.result[0].meta;const p=m.regularMarketPrice,pc=m.chartPreviousClose||m.previousClose;const ch=p-pc;r[n]={price:p.toFixed(2),change:ch.toFixed(2),changePct:((ch/pc)*100).toFixed(2),up:ch>=0};}}catch{}
  }return r;
}
async function fetchCD(sym,range,interval){
  try{const d=await vp(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${interval}&range=${range}`);if(d?.chart?.result){const r=d.chart.result[0],ts=r.timestamp||[],cl=r.indicators.quote[0].close||[];const l=[],v=[];for(let i=0;i<ts.length;i++){if(cl[i]!=null){l.push(ts[i]*1000);v.push(cl[i]);}}return{labels:l,values:v};}}catch{}return null;
}

// Utils
function tA(d){try{const df=Date.now()-new Date(d).getTime(),m=Math.floor(df/60000);if(m<2)return'Baru saja';if(m<60)return m+' menit lalu';const h=Math.floor(m/60);if(h<24)return h===1?'1 jam lalu':h+' jam lalu';const dy=Math.floor(h/24);return dy===1?'Kemarin':dy+' hari lalu';}catch{return'';}}
function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sH(h){const t=document.createElement('div');t.innerHTML=h||'';return(t.textContent||'').trim();}
function xSrc(t){const m=(t||'').match(/\s[-\u2013\u2014]\s([^-\u2013\u2014]+)$/);return m?m[1].trim():'';}
function sh(id){document.getElementById(id).style.display='';}
function hi(id){document.getElementById(id).style.display='none';}
function sT(id,t){document.getElementById(id).textContent=t;}

// Charts
function fD(ts,rng){const d=new Date(ts);if(rng==='1d')return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});if(rng==='5d')return d.toLocaleDateString('id-ID',{weekday:'short',hour:'2-digit',minute:'2-digit'});if(rng==='1mo')return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});if(rng==='1y')return d.toLocaleDateString('id-ID',{month:'short',year:'2-digit'});return d.toLocaleDateString('id-ID',{month:'short',year:'numeric'});}
function mC(cid,ref,data,rng){
  const ctx=document.getElementById(cid);if(!ctx)return null;
  const lb=data.labels.map(t=>fD(t,rng));
  const up=data.values[data.values.length-1]>=data.values[0];
  const lc=up?'#22c55e':'#ef4444',fc=up?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)';
  const cfg={type:'line',data:{labels:lb,datasets:[{data:data.values,borderColor:lc,backgroundColor:fc,borderWidth:1.5,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:lc,fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:600},interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e293b',titleColor:'#94a3b8',bodyColor:'#f1f5f9',titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:12,weight:'bold'},padding:10,cornerRadius:6,displayColors:false,callbacks:{label:c=>'$'+c.parsed.y.toFixed(2)}}},scales:{x:{display:true,grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{family:'JetBrains Mono',size:9},maxTicksLimit:6,maxRotation:0},border:{display:false}},y:{display:true,position:'right',grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{family:'JetBrains Mono',size:9},maxTicksLimit:5,callback:v=>'$'+v.toFixed(0)},border:{display:false}}}}};
  if(ref){ref.data.labels=lb;ref.data.datasets[0].data=data.values;ref.data.datasets[0].borderColor=lc;ref.data.datasets[0].backgroundColor=fc;ref.update('none');return ref;}
  return new Chart(ctx,cfg);
}
function uCD(c,data,tfk){
  const card=document.getElementById(c+'-card');if(!card||!data||data.values.length<2)return;
  const f=data.values[0],l=data.values[data.values.length-1],ch=l-f,cp=(ch/f)*100,up=ch>=0;
  const tf=TF.find(t=>t.key===tfk);
  const pe=card.querySelector('.pr');const ce=card.querySelector('.ch');const te=card.querySelector('.tfl');
  if(pe)pe.textContent='$'+l.toFixed(2);
  if(ce){ce.className='ch '+(up?'up':'dn');ce.innerHTML=`${up?'&#9650;':'&#9660;'} $${Math.abs(ch).toFixed(2)} (${up?'+':''}${cp.toFixed(2)}%)`;}
  if(te)te.textContent=tf?tf.label:'';
}
async function sTF(c,k){
  const tf=TF.find(t=>t.key===k);if(!tf)return;
  document.querySelectorAll(`.tt[data-c="${c}"]`).forEach(t=>t.classList.toggle('ac',t.dataset.tf===k));
  if(c==='gold')gTF=k;else oTF=k;
  const w=document.getElementById(c+'-cw');if(w&&!w.querySelector('.chl')){const l=document.createElement('div');l.className='chl';l.textContent='Memuat...';w.appendChild(l);}
  const d=await fetchCD(c==='gold'?'GC=F':'CL=F',tf.range,tf.interval);
  if(w){const l=w.querySelector('.chl');if(l)l.remove();}
  if(d?.labels.length>0){if(c==='gold')gC=mC('gc',gC,d,tf.range);else oC=mC('oc',oC,d,tf.range);uCD(c,d,k);}
}
window.sTF=sTF;

// Render
function renderAll(a,c){
  hi('loading');arts=a;comms=c;
  const top=a[0],rest=a.slice(1);
  const cc={};a.forEach(x=>{cc[x.category]=(cc[x.category]||0)+1;});
  const es=esc_a(a);
  const mil=cc.MILITARY||0,dip=cc.DIPLOMATIC||0,nuc=cc.NUCLEAR||0;
  let sm=[`Terdapat <em>${a.length} berita</em> terkini mengenai konflik Iran-AS-Israel.`];
  if(mil>0&&mil>=dip)sm.push(`Perkembangan didominasi oleh berita <em>militer (${mil} artikel)</em>, menunjukkan ketegangan yang masih tinggi.`);
  else if(dip>0)sm.push(`Terdapat sinyal <em>diplomasi aktif (${dip} artikel)</em>, mengindikasikan upaya de-eskalasi.`);
  if(nuc>0)sm.push(`Isu <em>nuklir muncul dalam ${nuc} laporan</em>.`);
  sm.push(`Level eskalasi: <em>${es.level} (${es.p}%)</em>.`);

  const gd=c.gold,od=c.oil;
  function pb(d){if(!d)return'<div class="pr" style="font-size:14px;color:var(--t4)">Data tidak tersedia</div>';return`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:2px;flex-wrap:wrap"><div class="pr">$${d.price}</div><span class="ch ${d.up?'up':'dn'}">${d.up?'&#9650;':'&#9660;'} $${Math.abs(parseFloat(d.change)).toFixed(2)} (${d.up?'+':''}${d.changePct}%)</span></div><div class="tfl">Hari ini</div>`;}
  function tft(c2){return`<div class="tft">${TF.map(t=>`<button class="tt ${t.key==='1D'?'ac':''}" data-c="${c2}" data-tf="${t.key}" onclick="sTF('${c2}','${t.key}')">${t.key}</button>`).join('')}</div>`;}

  let cards='';rest.forEach((x,i)=>{cards+=`<div class="nc" style="animation-delay:${.15+i*.06}s"><div class="nh"><h3><a href="${e(x.link)}" target="_blank">${e(x.title)}</a></h3><span class="ct ct-${x.category}">${x.category}</span></div>${x.summary?`<p class="sm">${e(x.summary)}</p>`:''}<div class="cm">${x.source?`<span>${e(x.source)}</span>`:''}<span>${tA(x.date)}</span></div></div>`;});

  document.getElementById('content').innerHTML=`
    <div class="lb"><div class="li"><span class="ld"></span><span id="lc"></span></div><button class="rb" onclick="fetchAll()">&#x21BB; Refresh</button></div>

    <div class="ids"><div class="sl2">\u{1F1EE}\u{1F1E9} RINGKASAN SITUASI</div><div class="tx">${sm.join(' ')}</div></div>

    <div class="ec">
      <div class="eh"><span class="sl" style="margin-bottom:0">&#x26A0;&#xFE0F; INDIKATOR ESKALASI PERANG DUNIA III</span><span class="elt" style="background:${es.bg};color:${es.color};border:1px solid ${es.color}40">${es.level} ${es.p}%</span></div>
      <div class="mt"><div class="mf" style="width:${es.p}%;background:linear-gradient(90deg,#16a34a,#d97706 50%,#dc2626)"></div></div>
      <div class="ml"><span>RENDAH</span><span>SEDANG</span><span>WASPADA</span><span>TINGGI</span><span>KRITIS</span></div>
      <div class="efs">${ESC_F.map(f=>`<span class="ef ${es.af.includes(f.id)?'a':''}">${f.l}</span>`).join('')}</div>
    </div>

    <div class="sl">&#x1F4C8; HARGA KOMODITAS DUNIA (LIVE)</div>
    <div class="cs"><div class="cg">
      <div class="cc" id="gold-card"><div class="cl">&#x1F947; EMAS (XAU)</div>${pb(gd)}<div class="sn">Yahoo Finance &middot; GC=F</div>${tft('gold')}<div class="cw" id="gold-cw"><canvas id="gc"></canvas><div class="chl">Memuat grafik...</div></div></div>
      <div class="cc" id="oil-card"><div class="cl">&#x1F6E2;&#xFE0F; MINYAK (WTI)</div>${pb(od)}<div class="sn">Yahoo Finance &middot; CL=F</div>${tft('oil')}<div class="cw" id="oil-cw"><canvas id="oc"></canvas><div class="chl">Memuat grafik...</div></div></div>
    </div></div>

    <div class="hc"><span class="sl" style="color:var(--blue)">BERITA UTAMA</span><p class="tx"><a href="${e(top.link)}" target="_blank">${e(top.title)}</a></p><div class="me">${top.source?`<span>${e(top.source)}</span>`:''}<span>${tA(top.date)}</span><span class="ct ct-${top.category}" style="font-size:9px;padding:2px 6px">${top.category}</span></div></div>

    <section><div class="sl">KATEGORI LIPUTAN</div><div class="css">${Object.entries(cc).sort((a,b)=>b[1]-a[1]).map(([c4,n])=>`<span class="ct ct-${c4}">${c4} (${n})</span>`).join('')}</div></section>

    <section><div class="sl">SEMUA PERKEMBANGAN</div><div class="nl">${cards}</div></section>

    <section><div class="sl">SUMBER ANALISIS MENDALAM</div><div class="ql">
      <a class="qlk" href="https://www.aljazeera.com/tag/iran/" target="_blank">Al Jazeera</a>
      <a class="qlk" href="https://www.reuters.com/world/middle-east/" target="_blank">Reuters</a>
      <a class="qlk" href="https://www.bbc.com/news/world/middle_east" target="_blank">BBC</a>
      <a class="qlk" href="https://www.middleeasteye.net/" target="_blank">Middle East Eye</a>
      <a class="qlk" href="https://www.timesofisrael.com/" target="_blank">Times of Israel</a>
      <a class="qlk" href="https://www.iaea.org/newscenter/pressreleases" target="_blank">IAEA</a>
    </div></section>

    <footer class="ft"><p>Live feed via Google News RSS. Komoditas dari Yahoo Finance. Auto-refresh: harga 60s, grafik 2 menit, berita 5 menit.</p></footer>
  `;
  sh('content');gC=null;oC=null;gTF='1D';oTF='1D';
  loadCharts();startAR();startClock();
}

async function loadCharts(){
  const tf=TF[0];
  const[g,o]=await Promise.all([fetchCD('GC=F',tf.range,tf.interval),fetchCD('CL=F',tf.range,tf.interval)]);
  document.querySelectorAll('.chl').forEach(el=>el.remove());
  if(g?.labels.length>0){gC=mC('gc',null,g,tf.range);uCD('gold',g,'1D');}
  if(o?.labels.length>0){oC=mC('oc',null,o,tf.range);uCD('oil',o,'1D');}
}

function startAR(){
  clearInterval(nt);clearInterval(pt2);clearInterval(ct2);
  pt2=setInterval(async()=>{
    const gt=TF.find(t=>t.key===gTF),ot=TF.find(t=>t.key===oTF);
    const[g,o]=await Promise.all([fetchCD('GC=F',gt.range,gt.interval),fetchCD('CL=F',ot.range,ot.interval)]);
    if(g?.labels.length>0)uCD('gold',g,gTF);if(o?.labels.length>0)uCD('oil',o,oTF);
  },60000);
  ct2=setInterval(async()=>{
    const gt=TF.find(t=>t.key===gTF),ot=TF.find(t=>t.key===oTF);
    const[g,o]=await Promise.all([fetchCD('GC=F',gt.range,gt.interval),fetchCD('CL=F',ot.range,ot.interval)]);
    if(g?.labels.length>0){gC=mC('gc',gC,g,gt.range);uCD('gold',g,gTF);}
    if(o?.labels.length>0){oC=mC('oc',oC,o,ot.range);uCD('oil',o,oTF);}
  },120000);
  nt=setInterval(async()=>{
    const[a2,c2]=await Promise.all([fetchNews(true),fetchPrices()]);
    if(a2.length>0)renderAll(a2,c2);
  },300000);
}

function startClock(){
  clearInterval(ckt);
  function tick(){const el=document.getElementById('lc');if(el)el.textContent='LIVE '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
  tick();ckt=setInterval(tick,1000);
}

async function fetchAll(){
  hi('content');hi('error');sh('loading');sT('pt','Mengambil data terbaru...');sT('pd','');
  try{
    const[a,c]=await Promise.all([fetchNews(false),fetchPrices()]);
    if(a.length===0)throw new Error('Tidak dapat mengambil berita.\n\nSemua CORS proxy sedang tidak merespons.\nSolusi:\n1. Coba refresh beberapa saat lagi\n2. Buka via local server: npx serve .\n3. Pasang extension "CORS Unblock"\n4. Deploy ke Netlify Drop / Vercel');
    sT('pt','Menyusun briefing...');
    renderAll(a,c);
  }catch(err){console.error(err);hi('loading');document.getElementById('em').innerText=err.message;sh('error');}
}

fetchAll();
</script>
</body>
</html>
